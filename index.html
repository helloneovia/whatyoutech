<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHAT YOU TECH - The Ultimate Coin Toss</title>
    <meta name="description" content="A visually stunning, high-tech coin toss game. Discover the future of probability with WHAT YOU TECH.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for high-tech look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <header class="glass-panel">
        <div class="logo">
            <!-- High Tech Logo SVG -->
            <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f3ff" />
                        <stop offset="100%" stop-color="#b521ff" />
                    </linearGradient>
                    <filter id="glow-svg" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 Z" fill="none" stroke="url(#neon-grad)" stroke-width="4" filter="url(#glow-svg)"/>
                <circle cx="50" cy="50" r="15" fill="none" stroke="#00f3ff" stroke-width="2"/>
                <path d="M50 35 L50 65 M35 50 L65 50" stroke="#b521ff" stroke-width="3"/>
                <circle cx="50" cy="50" r="5" fill="#00f3ff" filter="url(#glow-svg)"/>
            </svg>
            <h1 id="logo-text">WHAT YOU <span class="accent-text">TECH</span></h1>
        </div>
        <nav>
            <a href="#" class="active">Simulator</a>
            <a href="#">Metrics</a>
            <a href="#">System</a>
        </nav>
    </header>

    <main>
        <div class="game-container glass-panel" id="game-panel">
            <div class="status-display">
                <h2 id="result-text">Awaiting Input...</h2>
            </div>

            <div class="scene">
                <div class="coin" id="coin">
                    <div class="coin-face coin-front">
                        <div class="coin-inner">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <span>HEADS</span>
                        </div>
                    </div>
                    <div class="coin-face coin-back">
                        <div class="coin-inner">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line>
                            </svg>
                            <span>TAILS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="flip-btn" class="neon-btn">INITIALIZE PROTOCOL</button>
                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">HEADS</span>
                        <span class="stat-value" id="heads-count">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">TAILS</span>
                        <span class="stat-value" id="tails-count">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">STREAK</span>
                        <span class="stat-value" id="streak-count" style="color: #f6e05e;">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
